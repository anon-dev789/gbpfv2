name = "gbpf-forwarder-keeper"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Poll every 2 minutes. Cloudflare cron minimum is 1 minute.
[triggers]
crons = ["*/2 * * * *"]

# Persistent cursor + pending-candidate set. Create with:
#   wrangler kv namespace create KEEPER_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "KEEPER_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Base mainnet.
CHAIN_ID = "8453"
# ForwarderMinter / ForwarderRedeemer (deploy them first — see README).
MINTER = "0x0000000000000000000000000000000000000000"
REDEEMER = "0x0000000000000000000000000000000000000000"
# Live core tokens.
USDS = "0x820C137fa70C8691f0e44Dc420a5e53c168921Dc"
GBPF = "0x1817FD23ceF7Da47DF934fdc880d72e653786770"
# Multicall3 (same address on Base).
MULTICALL3 = "0xcA11bde05977b3631167028862bE2a173976CA11"
# Block to start scanning from (a few blocks before the forwarder contracts were deployed).
START_BLOCK = "47553890"
# Don't scan more than this many blocks in one tick (catch-up bound).
MAX_RANGE = "3000"
# Skip sweeping a token's deposit until its waiting total is at least this (wei) — avoids paying
# gas to process dust. Tune per token.
MIN_BATCH_WEI = "1000000000000000000"

# Secrets (set with `wrangler secret put <NAME>` — NOT in this file):
#   BASE_RPC_URL          a Base RPC endpoint (a private one is strongly recommended)
#   EXECUTOR_PRIVATE_KEY  the hot key that sends sweepAndExecute; keep it lightly funded with ETH
#                         (it is reimbursed from each contract's gas tank)
</content>
