name = "gbpf-forwarder-keeper"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Poll every 2 minutes. Cloudflare cron minimum is 1 minute.
[triggers]
crons = ["*/2 * * * *"]

# Persistent cursor + pending-candidate set. Create with:
#   wrangler kv namespace create KEEPER_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "KEEPER_KV"
id = "95198a368dad46f1b894476e9d3e4782"

[vars]
# Base mainnet.
CHAIN_ID = "8453"
# ForwarderMinter / ForwarderRedeemer — SpreadCurve-fix redeploy (new core, Base 8453).
MINTER = "0xd65d1C18DdEdF90D488C27EB7F3e1495cf70d906"
REDEEMER = "0xad6c5222c087CAd4dCBb4F9c2933107740ae3853"
# Core tokens. USDS unchanged; GBPF is the new token from the redeploy.
USDS = "0x820C137fa70C8691f0e44Dc420a5e53c168921Dc"
GBPF = "0x836f4b0e5774eDb800F4e0741E825Ee6F8cD6bf6"
# Multicall3 (same address on Base).
MULTICALL3 = "0xcA11bde05977b3631167028862bE2a173976CA11"
# Block to start scanning from. Set to just before the new forwarders' deploy block (~47657814) so
# no deposits can exist before it. NOTE: the keeper needs an RPC that serves eth_getLogs over its
# scan range — the public/stale RPCs hit the "archive requests" wall; set BASE_RPC_URL to a healthy
# archive endpoint (secret).
START_BLOCK = "47657810"
# Don't scan more than this many blocks in one tick (catch-up bound).
MAX_RANGE = "3000"
# Skip sweeping a token's deposit until its waiting total is at least this (wei) — avoids paying
# gas to process dust. Tune per token.
MIN_BATCH_WEI = "1000000000000000000"

# Secrets (set in the Cloudflare dashboard, or `wrangler secret put <NAME>` — NOT in this file):
#   BASE_RPC_URL  a PRIVATE Base RPC endpoint (Alchemy/QuickNode/etc.) that allows eth_getLogs.
#                 The public mainnet.base.org rate-limits the keeper and will NOT work.
#   PRIVATE_KEY   the hot key that sends sweepAndExecute; keep it lightly funded with ETH
#                 (it is reimbursed from each contract's gas tank)
