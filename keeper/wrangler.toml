name = "gbpf-forwarder-keeper"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Poll every 2 minutes. Cloudflare cron minimum is 1 minute.
[triggers]
crons = ["*/2 * * * *"]

# Persistent cursor + pending-candidate set. Create with:
#   wrangler kv namespace create KEEPER_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "KEEPER_KV"
id = "95198a368dad46f1b894476e9d3e4782"

[vars]
# Base mainnet.
CHAIN_ID = "8453"
# ForwarderMinter / ForwarderRedeemer (live on Base — DEPLOYMENT.md).
MINTER = "0x163e95500660bDF76D7F2dD97bb6F47d947C7226"
REDEEMER = "0x5b1c7dF048a7E4EbEA285B64Cb1FCa675044c9E2"
# Live core tokens.
USDS = "0x820C137fa70C8691f0e44Dc420a5e53c168921Dc"
GBPF = "0x1817FD23ceF7Da47DF934fdc880d72e653786770"
# Multicall3 (same address on Base).
MULTICALL3 = "0xcA11bde05977b3631167028862bE2a173976CA11"
# Block to start scanning from (a few blocks before the forwarder contracts were deployed at
# block 47608520; no deposits can exist before then).
START_BLOCK = "47608500"
# Don't scan more than this many blocks in one tick (catch-up bound).
MAX_RANGE = "3000"
# Skip sweeping a token's deposit until its waiting total is at least this (wei) — avoids paying
# gas to process dust. Tune per token.
MIN_BATCH_WEI = "1000000000000000000"

# Secrets (set in the Cloudflare dashboard, or `wrangler secret put <NAME>` — NOT in this file):
#   BASE_RPC_URL  a Base RPC endpoint (a private one is strongly recommended)
#   PRIVATE_KEY   the hot key that sends sweepAndExecute; keep it lightly funded with ETH
#                 (it is reimbursed from each contract's gas tank)
</content>
