name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry build + tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Format check
        run: forge fmt --check

      - name: Build (with sizes)
        run: forge build --sizes

      - name: Run unit + invariant tests (no fork tests)
        # Fork tests live under test/fork/ and need network access; they're run by the
        # separate fork-tests workflow on a schedule. CI shouldn't burn public RPC rate
        # limits on every push.
        run: forge test --no-match-contract 'Fork' -vvv
